# Visual Studio 2015 is the last AppVeyor image that ships the
# Python 3.5/3.6 toolchains aiohttp 3.0.8 is built against.
image: Visual Studio 2015

environment:
  matrix:
    - PYTHON: "C:\\Python35"
    - PYTHON: "C:\\Python35-x64"
    - PYTHON: "C:\\Python36"
    - PYTHON: "C:\\Python36-x64"

install:
  - "tools/build.cmd %PYTHON%\\python.exe -m pip install -U pip wheel setuptools"
  - "tools/build.cmd %PYTHON%\\python.exe -m pip install -r requirements/ci.txt"

build: false

test_script:
  - "tools/build.cmd %PYTHON%\\python.exe setup.py test"
