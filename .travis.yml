sudo: false

language: python

# Ubuntu 16.04 still ships the Python 3.5/3.6 interpreters that
# aiohttp 3.0.8 (python_requires='>=3.5.3') is written against.
dist: xenial

python:
- 3.5
- &mainstream_python 3.6

cache: pip

install:
- pip install --upgrade pip wheel setuptools
- pip install -r requirements/ci.txt

script:
- make cov-ci-no-ext
- make cov-ci-aio-debug
- make cov-ci-run

after_success:
- codecov

jobs:
  include:
  - python: *mainstream_python
    env:
    - JOB=flake8
    after_success: []
    script:
    - flake8 aiohttp examples tests demos

before_cache:
- rm -f $HOME/.cache/pip/log/debug.log
